<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orbit White | Geek Store</title>
    
    <meta property="og:title" content="Orbit White | Geek Store">
    <meta property="og:description" content="Hackeie seu setup com os melhores equipamentos geek! Frete grátis para todo o Brasil.">
    <meta property="og:image" content="logo.png">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-page: #6d28d9;       
            --header-dark: #1e1b4b;   
            --accent-cyan: #22d3ee;   
            --accent-yellow: #fde047; 
            --accent-pink: #f472b6;   
            --sucesso-green: #4ade80; 
            --whatsapp-verde: #25d366; 
            --retro-gray: #d1d5db;    
            --border-cartoon: 3px solid #000000;
            --shadow-cartoon: 5px 5px 0px #000000;
            --font-main: 'Inter', sans-serif;
            --font-cartoon: 'Bungee', cursive;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 100%; background: var(--bg-page); color: #fff; font-family: var(--font-main); overflow-x: hidden; }

        header { background: var(--header-dark); padding: 15px 20px; border-bottom: var(--border-cartoon); position: sticky; top: 0; z-index: 1000; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        @media (min-width: 992px) { .nav-container { flex-direction: row; justify-content: space-between; } }

        .logo-text { font-family: var(--font-cartoon); display: flex; flex-direction: column; align-items: center; line-height: 0.9; cursor: pointer; text-transform: uppercase; }
        .logo-text .orbit { font-size: 1.8rem; color: #fff; text-shadow: 3px 3px 0px #000; }
        .logo-text .white { font-size: 1.4rem; color: #000; background: #fff; padding: 2px 12px; border-radius: 8px; border: 3px solid #000; box-shadow: 4px 4px 0px #000; margin-top: 5px; }

        .search-box { position: relative; width: 100%; max-width: 800px; }
        .search-box input { width: 100%; padding: 15px 15px 15px 50px; border-radius: 10px; border: 4px solid #000; background: var(--retro-gray); color: #000; font-weight: 900; font-size: 1rem; outline: none; box-shadow: inset -3px -3px 0px #888, inset 3px 3px 0px #fff, 5px 5px 0px rgba(0,0,0,0.5); }
        .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #000; font-size: 1.2rem; }

        .slider-section { padding: 20px 15px; max-width: 1100px; margin: 0 auto; }
        .slider-container { border-radius: 25px; overflow: hidden; background: #000; height: 200px; border: var(--border-cartoon); box-shadow: var(--shadow-cartoon); }
        @media (min-width: 768px) { .slider-container { height: 350px; } }
        .slider-wrapper { display: flex; width: 100%; height: 100%; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .slider-item { min-width: 100%; height: 100%; scroll-snap-align: start; }
        .slider-item img { width: 100%; height: 100%; object-fit: cover; }

        .cta-section { text-align: center; padding: 30px 15px; }
        .cta-section h2 { font-family: var(--font-cartoon); font-size: 2rem; color: var(--accent-yellow); text-shadow: 4px 4px 0px #000; }
        .cta-section p { font-weight: 900; text-transform: uppercase; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 50px; display: inline-block; margin-top: 10px; font-size: 0.8rem; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 0 15px; max-width: 1100px; margin: 0 auto; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); } }
        .card { background: var(--accent-cyan); border-radius: 25px; border: var(--border-cartoon); box-shadow: var(--shadow-cartoon); transition: 0.2s; cursor: pointer; overflow: hidden; display: flex; flex-direction: column; height: 100%; }
        .img-box { width: 100%; height: 150px; display: flex; align-items: center; justify-content: center; padding: 15px; background: #fff; border-bottom: var(--border-cartoon); }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .card-info { padding: 15px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .price { font-family: var(--font-cartoon); font-size: 1.1rem; color: #000; background: #fff; border: 2px solid #000; border-radius: 10px; padding: 4px; display: block;}

        /* FOOTER & PAGAMENTO ORIGINAL */
        footer { background: var(--header-dark); padding: 40px 20px; text-align: center; border-top: var(--border-cartoon); margin-top: 50px; }
        .badge { background: #fff; color: #000; padding: 10px 15px; border-radius: 15px; border: var(--border-cartoon); display: inline-flex; align-items: center; gap: 8px; margin: 5px; font-weight: 900; font-size: 0.8rem; box-shadow: 3px 3px 0px rgba(0,0,0,0.2); }
        
        .payment-section { margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 25px; }
        .payment-section h4 { font-family: var(--font-cartoon); font-size: 0.9rem; margin-bottom: 15px; color: var(--accent-cyan); }
        .payment-icons { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; font-size: 2rem; color: #fff; }
        .pix-icon { font-weight: 900; background: #fff; color: #32bcad; padding: 2px 10px; border-radius: 8px; border: 2px solid #000; font-size: 1rem; vertical-align: middle; box-shadow: 2px 2px 0px #000; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .modal-content { background: #fff; color: #000; padding: 25px; border-radius: 30px; border: var(--border-cartoon); max-width: 400px; width: 90%; text-align: center; box-shadow: 10px 10px 0px #000; }
        .modal-input { width: 100%; padding: 15px; border-radius: 15px; border: var(--border-cartoon); margin: 15px 0; font-weight: 700; }
        .btn-modal { font-family: var(--font-cartoon); width: 100%; padding: 15px; border-radius: 20px; border: var(--border-cartoon); cursor: pointer; box-shadow: 4px 4px 0px #000; font-size: 1rem; }
        .step { display: none; } .step.active { display: block; }

        .btn-whatsapp-wrapper { position: fixed; bottom: 20px; right: 20px; z-index: 3000; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .whatsapp-text { font-family: var(--font-cartoon); background: var(--whatsapp-verde); color: white; padding: 8px 15px; border-radius: 15px; border: var(--border-cartoon); box-shadow: var(--shadow-cartoon); font-size: 0.75rem; }
        .btn-whatsapp { width: 55px; height: 55px; background: var(--whatsapp-verde); color: white; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 28px; border: var(--border-cartoon); box-shadow: var(--shadow-cartoon); }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo-text" onclick="location.reload()">
                <span class="orbit">Orbit</span>
                <span class="white">White</span>
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="BUSCAR EQUIPAMENTO..." onkeyup="buscar()">
            </div>
        </div>
    </header>

    <div class="container-central">
        <section class="slider-section">
            <div class="slider-container">
                <div class="slider-wrapper" id="slider">
                    <div class="slider-item"><img src="banner.png"></div>
                    <div class="slider-item"><img src="banner1.png"></div>
                    <div class="slider-item"><img src="banner2.png"></div>
                    <div class="slider-item"><img src="banner3.png"></div>
                </div>
            </div>
        </section>

        <section class="cta-section">
            <h2>E AÍ, O QUE VAI<br>QUERER HOJE?</h2>
            <p>Frete Grátis Para Todo Brasil</p>
        </section>

        <main class="grid" id="productGrid"></main>
    </div>

    <footer>
        <div class="badge"><i class="fas fa-shield-alt"></i><span>SITE SEGURO</span></div>
        <div class="badge"><i class="fas fa-truck"></i><span>ENVIO RÁPIDO</span></div>

        <div class="payment-section">
            <h4>FORMAS DE PAGAMENTO</h4>
            <div class="payment-icons">
                <i class="fab fa-cc-visa"></i>
                <i class="fab fa-cc-mastercard"></i>
                <i class="fab fa-cc-apple-pay"></i>
                <span class="pix-icon">PIX</span>
                <i class="fas fa-barcode"></i>
            </div>
        </div>
        <p style="margin-top: 25px; font-size: 0.7rem; opacity: 0.7;"> &copy; 2026 Orbit White Store | CNPJ: 60.726.256/0001-02</p>
    </footer>

    <a href="https://wa.me/5521983747028" class="btn-whatsapp-wrapper" target="_blank">
        <div class="whatsapp-text">Suporte</div>
        <div class="btn-whatsapp"><i class="fab fa-whatsapp"></i></div>
    </a>

    <div id="descModal" class="modal">
        <div class="modal-content">
            <div id="step1" class="step active">
                <img id="modalImg" style="width:110px; margin-bottom:15px;">
                <h3 id="modalName" style="font-family:var(--font-cartoon); margin-bottom:10px;"></h3>
                <p id="modalDesc" style="font-size:0.9rem; margin-bottom:20px; font-weight:700; color:#444;"></p>
                <button onclick="proximoPasso()" class="btn-modal" style="background:var(--accent-pink);">EU QUERO!</button>
            </div>
            <div id="step2" class="step">
                <h3 style="font-family:var(--font-cartoon);">QUASE LÁ!</h3>
                <form id="purchaseForm" action="https://formspree.io/f/xnjbwvkd" method="POST">
                    <input type="hidden" name="produto" id="formProduto">
                    <input type="email" name="email" class="modal-input" placeholder="seu.email@top.com" required>
                    <button type="submit" class="btn-modal" style="background:var(--sucesso-green);">FINALIZAR!</button>
                </form>
            </div>
            <p onclick="fecharModal()" style="margin-top:20px; cursor:pointer; font-weight:800;">[ VOLTAR ]</p>
        </div>
    </div>

    <script>
        const produtos = [
            { id: 'fone', nome: 'Fone Bluetooth GD28 OWS', preco: 'R$ 21,00', img: 'fonebluetooth.png', desc: 'Tecnologia OWS para som imersivo.', link: 'https://pag.ae/81BP3rmb2' },
            { id: 'suporte', nome: 'Base Carregador PS5', preco: 'R$ 60,00', img: 'basecarregadorps5.png', desc: 'Carregue 2 controles simultaneamente.', link: 'https://pag.ae/81BP5Hupo' },
            { id: 'controle', nome: 'Controle Dualshock 4', preco: 'R$ 70,00', img: 'controleps4.png', desc: 'Alta precisão para PS4 e PC.', link: 'https://pag.ae/81BP4FXb2' },
            { id: 'gamesir', nome: 'Gamesir G7 SE', preco: 'R$ 300,00', img: 'controlegamesirg7.png', desc: 'Analógicos Hall Effect anti-drift.', link: 'https://pag.ae/81BP42Mjo' }
        ];

        let produtoSelecionado = null;

        function renderizar(lista) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = lista.map(p => `
                <div class="card" onclick="abrirModal('${p.id}')">
                    <div class="img-box"><img src="${p.img}"></div>
                    <div class="card-info">
                        <p style="color:#000; font-weight:800; font-size:0.9rem; margin-bottom:10px;">${p.nome}</p>
                        <b class="price">${p.preco}</b>
                    </div>
                </div>
            `).join('');
        }

        function abrirModal(id) {
            produtoSelecionado = produtos.find(p => p.id === id);
            document.getElementById('modalImg').src = produtoSelecionado.img;
            document.getElementById('modalName').innerText = produtoSelecionado.nome;
            document.getElementById('modalDesc').innerText = produtoSelecionado.desc;
            document.getElementById('formProduto').value = produtoSelecionado.nome;
            document.getElementById('step1').classList.add('active');
            document.getElementById('step2').classList.remove('active');
            document.getElementById('descModal').style.display = 'flex';
        }

        function proximoPasso() {
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        }

        function fecharModal() { document.getElementById('descModal').style.display = 'none'; }

        document.getElementById('purchaseForm').onsubmit = function(e) {
            e.preventDefault();
            const form = this;
            fetch(form.action, { method: 'POST', body: new FormData(form), headers: { 'Accept': 'application/json' } });
            window.open(produtoSelecionado.link, '_blank');
            window.location.href = "obrigado.html";
        };

        function buscar() {
            const t = document.getElementById('searchInput').value.toLowerCase();
            renderizar(produtos.filter(p => p.nome.toLowerCase().includes(t)));
        }

        renderizar(produtos);

        let slideIndex = 0;
        const slider = document.getElementById('slider');
        setInterval(() => {
            if(slider) {
                slideIndex = (slideIndex + 1) % 4;
                slider.scrollTo({ left: slider.clientWidth * slideIndex, behavior: 'smooth' });
            }
        }, 3000);
    </script>
</body>
</html>
