<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit VIP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .card { background: #0a0a0a; border: 1px solid #222; border-radius: 12px; overflow: hidden; }
        .card img { width: 100%; height: 260px; object-fit: cover; filter: blur(15px); }
        button { background: #ff0055; color: #fff; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h1 style="color:#ff0055; padding:20px;">PREMIUM FEED</h1>
    
    <div id="statusMsg" style="padding: 10px; color: #888;">A carregar dados do banco...</div>
    <div class="grid" id="modelGrid"></div>

    <script>
        // Chaves que tu mandaste
        const URL = 'https://gmqcboqqephsczkgpata.supabase.co';
        const KEY = 'sb_publishable_jE-zvcCRdKEIx1gYdGxthA_-XAnYwrX';
        
        const _supabase = supabase.createClient(URL, KEY);

        async function carregar() {
            const status = document.getElementById('statusMsg');
            
            try {
                // Tenta puxar da tabela 'modelos'
                const { data, error } = await _supabase.from('modelos').select('*');
                
                if (error) {
                    status.innerHTML = "ERRO: " + error.message;
                    status.style.color = "red";
                    return;
                }

                if (data && data.length > 0) {
                    status.style.display = "none";
                    document.getElementById('modelGrid').innerHTML = data.map(m => `
                        <div class="card">
                            <img src="${m.img_teaser}">
                            <div style="padding:10px;">
                                <h3>${m.nome}</h3>
                                <button onclick="alert('Senha: ${m.senha}')">LIBERAR</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    status.innerHTML = "BANCO CONECTADO, MAS A TABELA ESTÁ VAZIA.<br>Adiciona a 'maya' no Table Editor do Supabase.";
                }
            } catch (err) {
                status.innerHTML = "ERRO DE CONEXÃO: Verifica a internet no Acode.";
            }
        }

        carregar();
    </script>
</body>
</html>
