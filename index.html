<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orbit White | Apps Raros</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #6d28d9;   
            --dark: #0f172a;       
            --cyan: #22d3ee;   
            --yellow: #fde047; 
            --green: #22c55e; 
            --border: 3px solid #000000;
            --shadow: 7px 7px 0px #000000;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            width: 100%; 
            background: #4f46e5;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-attachment: fixed;
            color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; 
        }

        .raros-bar {
            background: var(--yellow);
            color: #000;
            text-align: center;
            padding: 10px;
            font-family: 'Bungee';
            font-size: 0.85rem;
            border-bottom: var(--border);
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        header { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(12px);
            padding: 20px; 
            border-bottom: var(--border); 
            position: sticky; top: 0; z-index: 1000; 
        }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        
        .logo-text { font-family: 'Bungee', cursive; text-align: center; line-height: 0.9; }
        .logo-text .orbit { font-size: 2rem; color: #fff; text-shadow: 4px 4px 0px #000; }
        .logo-text .white { 
            font-size: 1.5rem; color: #fff; background: var(--primary); 
            padding: 5px 20px; border-radius: 10px; border: var(--border); 
            box-shadow: 5px 5px 0px #000; display: inline-block; margin-top: 5px; 
        }

        .search-box { position: relative; width: 100%; max-width: 500px; }
        .search-box input { 
            width: 100%; padding: 15px 15px 15px 55px; 
            border-radius: 20px; border: var(--border); 
            background: #fff; color: #000; font-weight: 800; outline: none;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
        }
        .search-box i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #000; }

        .cat-container { padding: 30px 15px; text-align: center; }
        .cat-item { display: inline-flex; flex-direction: column; align-items: center; gap: 10px; }
        .cat-icon { 
            width: 80px; height: 80px; background: var(--cyan); border-radius: 25px; 
            display: flex; align-items: center; justify-content: center; 
            color: var(--dark); font-size: 2rem; border: var(--border); box-shadow: 6px 6px 0px #000;
        }
        .cat-item span { font-family: 'Bungee'; font-size: 0.9rem; text-shadow: 3px 3px 0px #000; }

        .grid { display: flex; justify-content: center; padding: 20px; }
        .card { 
            background: #fff; border-radius: 30px; border: var(--border); 
            box-shadow: var(--shadow); width: 100%; max-width: 320px; overflow: hidden; cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card:hover { transform: translateY(-8px); }
        .img-box { width: 100%; height: 220px; display: flex; align-items: center; justify-content: center; padding: 20px; background: #fff; border-bottom: var(--border); }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .card-info { padding: 20px; text-align: center; background: #fff; color: #000; }
        .card-info p { font-weight: 900; font-size: 1.2rem; margin-bottom: 15px; }
        .price { font-family: 'Bungee'; font-size: 1.2rem; color: #fff; background: var(--green); border: var(--border); border-radius: 12px; padding: 10px; display: block; box-shadow: 4px 4px 0px #000; }

        .btn-whatsapp-wrapper { position: fixed; bottom: 30px; right: 25px; z-index: 3000; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .whatsapp-text { font-family: 'Bungee'; background: var(--green); color: white; padding: 12px 18px; border-radius: 18px; border: var(--border); box-shadow: 4px 4px 0px #000; font-size: 0.8rem; }
        .btn-whatsapp { width: 60px; height: 60px; background: var(--green); color: white; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 30px; border: var(--border); box-shadow: 4px 4px 0px #000; }

        .modal { 
            display: none; position: fixed; z-index: 4000; left: 0; top: 0; 
            width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); 
            align-items: center; justify-content: center; backdrop-filter: blur(10px); 
        }
        .modal-content { 
            background: #fff; color: #000; padding: 35px; border-radius: 40px; 
            border: var(--border); max-width: 380px; width: 95%; text-align: center; box-shadow: 15px 15px 0px #000;
        }
        .btn-modal { font-family: 'Bungee'; width: 100%; padding: 20px; border-radius: 20px; border: var(--border); cursor: pointer; box-shadow: 6px 6px 0px #000; font-size: 1.2rem; color: #fff; background: var(--green); }

        footer { background: var(--dark); padding: 50px 20px; text-align: center; border-top: var(--border); margin-top: 60px; }
    </style>
</head>
<body>

    <div class="raros-bar">SUA LOJA DE APLICATIVOS RAROS</div>

    <header>
        <div class="nav-container">
            <div class="logo-text">
                <span class="orbit">Orbit</span><br>
                <span class="white">White</span>
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="BUSCAR APLICATIVO..." onkeyup="buscar()">
            </div>
        </div>
    </header>

    <div class="cat-container">
        <div class="cat-item">
            <div class="cat-icon"><i class="fas fa-play"></i></div>
            <span>APPS</span>
        </div>
    </div>

    <main class="grid">
        <div class="card" id="appCard" onclick="abrir()">
            <div class="img-box"><img src="gamerec.jpg" alt="GameRec"></div>
            <div class="card-info">
                <p>GameRec Pro</p>
                <b class="price">DOWNLOAD GRÁTIS</b>
            </div>
        </div>
    </main>

    <a href="https://wa.me/5521983747028" class="btn-whatsapp-wrapper" target="_blank">
        <div class="whatsapp-text">Suporte</div>
        <div class="btn-whatsapp"><i class="fab fa-whatsapp"></i></div>
    </a>

    <footer>
        <p style="font-weight: 900; color: #fff; letter-spacing: 1px;"><i class="fas fa-shield-alt"></i> DOWNLOAD 100% SEGURO</p>
        <p style="margin-top: 15px; font-size: 0.8rem; opacity: 0.5; color: #fff;">© 2026 Orbit White</p>
    </footer>

    <div id="m" class="modal">
        <div class="modal-content">
            <img src="gamerec.jpg" style="width:130px; border-radius:30px; border: var(--border); margin-bottom:20px; box-shadow: 5px 5px 0 #000;">
            <h3 style="font-family:'Bungee'; color: var(--primary);">GameRec Pro</h3>
            <p style="font-weight:700; color:#444; margin:20px 0; line-height:1.5;">O melhor gravador de tela para sua gameplay. Alta resolução e áudio interno cristalino!</p>
            <button class="btn-modal" onclick="window.open('https://www.mediafire.com/file/cyrcgifsoh616q0/screenrecordernow.apk/file', '_blank')">
                <i class="fas fa-download"></i> BAIXAR AGORA
            </button>
            <p onclick="fechar()" style="margin-top:25px; cursor:pointer; font-weight:900; color:#aaa; text-decoration:underline;">VOLTAR AO SITE</p>
        </div>
    </div>

    <script>
        function abrir(){document.getElementById('m').style.display='flex'}
        function fechar(){document.getElementById('m').style.display='none'}
        function buscar(){
            let v = document.getElementById('searchInput').value.toLowerCase();
            document.getElementById('appCard').style.display = "gamerec".includes(v) ? "block" : "none";
        }
    </script>
</body>
</html>
