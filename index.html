<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orbit White | Hardware & Tech Premium</title>
    
    <meta name="description" content="Orbit White - A melhor seleção de Hardware e Tech Premium. Controles, Áudio e Energia com envio para todo o Brasil.">
    <meta name="keywords" content="Hardware, Tech, PS5, Gamesir, Orbit White, Tecnologia, Dualshock 4, Fone Bluetooth, Carregador">
    <meta name="author" content="Orbit White">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Orbit White | Hardware & Tech Premium">
    <meta property="og:description" content="Turbine seu setup com os melhores acessórios tech. Envio para todo o Brasil.">
    <meta property="og:image" content="https://suadominio.com.br/banner.png"> 
    <meta property="og:url" content="https://suadominio.com.br">
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --roxo: #bc13fe; 
            --dark: #0a0414; 
            --sucesso: #00a650; 
            --whatsapp-verde: #25d366; 
            --bg-lateral: linear-gradient(135deg, #f0f0f0 0%, #ffffff 100%); 
            --borda: #eeeeee; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background: var(--bg-lateral); color: #333; overflow-x: hidden; min-height: 100vh; }

        header { background: var(--dark); padding: 12px 15px; border-bottom: 2px solid var(--roxo); position: sticky; top: 0; z-index: 1000; }
        .nav-container { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; gap: 15px; }
        .logo-box { display: flex; flex-direction: column; line-height: 0.8; cursor: pointer; min-width: fit-content; }
        .logo-main { color: white; font-weight: 900; font-size: 1.1rem; }
        .logo-sub { color: var(--roxo); font-weight: 900; font-size: 0.9rem; }
        
        .search-box { flex-grow: 1; position: relative; max-width: 500px; margin-left: auto; }
        .search-box input { width: 100%; padding: 10px 15px 10px 40px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.15); color: white; font-size: 0.85rem; outline: none; transition: 0.3s; }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--roxo); font-size: 0.9rem; }

        .container-central { max-width: 1100px; margin: 0 auto; background: #fff; box-shadow: 0 0 50px rgba(0,0,0,0.05); }

        .slider-section { padding: 15px; background: #fff; }
        .slider-container { position: relative; border-radius: 20px; overflow: hidden; background: #000; max-height: 380px; }
        .slider-wrapper { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; scrollbar-width: none; }
        .slider-wrapper::-webkit-scrollbar { display: none; }
        .slider-item { min-width: 100%; scroll-snap-align: start; flex-shrink: 0; }
        .slider-item img { width: 100%; height: 380px; display: block; object-fit: cover; }

        @media (max-width: 768px) {
            .slider-container, .slider-item img { height: 200px; }
            .container-central { box-shadow: none; }
        }

        .categories-container { padding: 20px 10px; background: #fff; }
        .categories-scroll { display: flex; gap: 20px; overflow-x: auto; padding: 10px; scrollbar-width: none; justify-content: flex-start; }
        .categories-scroll::-webkit-scrollbar { display: none; }
        @media (min-width: 768px) { .categories-scroll { justify-content: center; } }

        .cat-item { display: flex; flex-direction: column; align-items: center; gap: 10px; min-width: 90px; cursor: pointer; transition: 0.3s; }
        .cat-icon { width: 65px; height: 65px; background: #f9f9f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #444; border: 1px solid var(--borda); font-size: 1.4rem; transition: 0.3s; }
        .cat-item.active .cat-icon { background: var(--roxo); color: white; border-color: var(--roxo); box-shadow: 0 5px 15px rgba(188, 19, 254, 0.3); }
        .cat-item span { font-size: 0.7rem; font-weight: 800; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }

        .main-content { padding: 20px 15px 50px; background: #fff; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); gap: 25px; } }

        .card { background: white; border-radius: 18px; padding: 20px; border: 1px solid var(--borda); text-align: center; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); border-color: rgba(188, 19, 254, 0.2); }
        
        .img-box { width: 100%; height: 150px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .card p { font-size: 0.8rem; font-weight: 700; height: 40px; margin-bottom: 10px; overflow: hidden; color: #444; }
        .price { font-size: 1.25rem; font-weight: 900; margin-bottom: 15px; display: block; color: var(--dark); }
        .btn-buy-card { background: var(--sucesso); color: white; padding: 14px; border-radius: 50px; border: none; font-weight: 800; width: 100%; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; transition: 0.3s; }

        footer { background: var(--dark); color: #fff; padding: 50px 20px; text-align: center; border-top: 4px solid var(--roxo); }
        .payment-row { display: flex; align-items: center; justify-content: center; gap: 25px; margin-bottom: 35px; opacity: 0.7; flex-wrap: wrap; }
        .payment-row i, .payment-row em { font-size: 24px; color: #fff; font-style: normal; font-weight: 900; }
        .trust-seals { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 500px; margin: 0 auto; }
        .seal-item { display: flex; align-items: center; gap: 10px; text-align: left; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; border: 1px solid rgba(188, 19, 254, 0.15); }
        .seal-item i { font-size: 1.2rem; color: var(--roxo); }
        .seal-text b { font-size: 0.65rem; display: block; color: #fff; }
        .seal-text span { font-size: 0.55rem; color: #aaa; }
        .cnpj-text { opacity: 0.4; font-size: 0.7rem; margin-top: 30px; letter-spacing: 0.5px; }

        /* WHATSAPP PULSANDO + SUPORTE */
        .btn-whatsapp-wrapper { position: fixed; bottom: 25px; right: 25px; z-index: 3000; display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .whatsapp-label { background: white; color: #333; padding: 8px 15px; border-radius: 50px; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #eee; }
        
        .btn-whatsapp { 
            width: 60px; height: 60px; background: var(--whatsapp-verde); color: white; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 32px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.2); 
            animation: pulse-green 2s infinite; 
        }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: white; padding: 30px; border-radius: 25px; max-width: 380px; width: 90%; text-align: center; }
        .modal-input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #eee; margin: 15px 0; outline: none; text-align: center; }
        .roxo-text { color: var(--roxo); }
    </style>
</head>
<body>

    <a href="https://wa.me/55SEUNUMERO" class="btn-whatsapp-wrapper" target="_blank">
        <span class="whatsapp-label">Suporte</span>
        <div class="btn-whatsapp"><i class="fab fa-whatsapp"></i></div>
    </a>

    <header>
        <div class="nav-container">
            <div class="logo-box" onclick="location.reload()"><span class="logo-main">ORBIT</span><span class="logo-sub">WHITE</span></div>
            <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="O que você busca?" onkeyup="buscar()"></div>
        </div>
    </header>

    <div class="container-central">
        <section class="slider-section">
            <div class="slider-container">
                <div class="slider-wrapper" id="slider">
                    <div class="slider-item"><img src="banner.png" alt="Banner 1"></div>
                    <div class="slider-item"><img src="banner1.png" alt="Banner 2"></div>
                    <div class="slider-item"><img src="banner2.png" alt="Banner 3"></div>
                    <div class="slider-item"><img src="banner3.png" alt="Banner 4"></div>
                </div>
            </div>
        </section>

        <div class="categories-container">
            <div class="categories-scroll">
                <div class="cat-item active" onclick="filtrarProdutos('todos', this)"><div class="cat-icon"><i class="fas fa-th-large"></i></div><span>Todos</span></div>
                <div class="cat-item" onclick="filtrarProdutos('audio', this)"><div class="cat-icon"><i class="fas fa-headphones"></i></div><span>Áudio</span></div>
                <div class="cat-item" onclick="filtrarProdutos('controles', this)"><div class="cat-icon"><i class="fas fa-gamepad"></i></div><span>Controles</span></div>
                <div class="cat-item" onclick="filtrarProdutos('energia', this)"><div class="cat-icon"><i class="fas fa-bolt"></i></div><span>Energia</span></div>
            </div>
        </div>

        <div class="cta-call" style="text-align: center; padding: 20px 10px; background: #fff;">
            <h2 style="font-weight: 900; font-size: 1.3rem; letter-spacing: -0.5px;">E AÍ, O QUE VOCÊ <span class="roxo-text">VAI QUERER</span> HOJE?</h2>
        </div>

        <main class="main-content"><div class="grid" id="productGrid"></div></main>

        <footer>
            <p style="font-size: 0.8rem; font-weight: 800; color: var(--roxo); margin-bottom: 20px; text-transform: uppercase;">Pague com segurança</p>
            <div class="payment-row">
                <i class="fab fa-cc-visa"></i><i class="fab fa-cc-mastercard"></i><i class="fab fa-google-pay"></i><i class="fab fa-apple-pay"></i><em>PIX</em>
            </div>
            <div class="trust-seals">
                <div class="seal-item"><i class="fas fa-lock"></i><div class="seal-text"><b>PAGBANK</b><span>SEGURO</span></div></div>
                <div class="seal-item"><i class="fas fa-shield-alt"></i><div class="seal-text"><b>SSL</b><span>PROTEGIDO</span></div></div>
                <div class="seal-item"><i class="fab fa-google"></i><div class="seal-text"><b>GOOGLE</b><span>VERIFICADO</span></div></div>
                <div class="seal-item"><i class="fas fa-truck"></i><div class="seal-text"><b>ENVIO</b><span>CORREIOS</span></div></div>
            </div>
            <div class="cnpj-text">&copy; 2026 Orbit White - CNPJ: 60.726.256/0001-02</div>
        </footer>
    </div>

    <div id="descModal" class="modal">
        <div class="modal-content">
            <img id="modalImg" style="width:140px; margin-bottom:15px; object-fit: contain;" src="">
            <h3 id="modalName" style="font-weight:800; color:var(--dark); margin-bottom: 10px;"></h3>
            <input type="email" id="userEmail" class="modal-input" placeholder="Seu melhor e-mail" required>
            <button id="confirmBuy" style="background:var(--sucesso); color:white; padding:18px; border-radius:50px; border:none; font-weight:800; width:100%; cursor:pointer; text-transform: uppercase;">CONCLUIR AGORA</button>
            <button style="background:none; border:none; margin-top:20px; color:#999; cursor:pointer;" onclick="fecharModal()">VOLTAR</button>
        </div>
    </div>

    <script>
        const produtos = [
            { id: 'fone', categoria: 'audio', nome: 'Fone Bluetooth GD28 OWS', preco: 'R$ 21,00', img: 'fonebluetooth.png', link: 'https://pag.ae/81BP3rmb2' },
            { id: 'suporte', categoria: 'energia', nome: 'Base Carregador PS5', preco: 'R$ 60,00', img: 'basecarregadorps5.png', link: 'https://pag.ae/81BP5Hupo' },
            { id: 'controle', categoria: 'controles', nome: 'Controle Dualshock 4', preco: 'R$ 70,00', img: 'controleps4.png', link: 'https://pag.ae/81BP4FXb2' },
            { id: 'gamesir', categoria: 'controles', nome: 'Gamesir G7 SE', preco: 'R$ 300,00', img: 'controlegamesirg7.png', link: 'https://pag.ae/81BP42Mjo' }
        ];

        const slider = document.getElementById('slider');
        let currentSlide = 0;
        function startAutoSlider() {
            setInterval(() => {
                currentSlide++;
                if (currentSlide >= 4) currentSlide = 0;
                slider.scrollTo({ left: slider.offsetWidth * currentSlide, behavior: 'smooth' });
            }, 5000);
        }
        startAutoSlider();

        function renderizar(lista) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            lista.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => abrirModal(p.id);
                // SEO: Adicionado atributo alt="p.nome - Orbit White" dinamicamente na tag img abaixo
                card.innerHTML = `<div class="img-box"><img src="${p.img}" alt="${p.nome} - Orbit White"></div><p>${p.nome}</p><b class="price">${p.preco}</b><button class="btn-buy-card">COMPRAR AGORA</button>`;
                grid.appendChild(card);
            });
        }

        function abrirModal(id) {
            const p = produtos.find(item => item.id === id);
            document.getElementById('modalImg').src = p.img;
            document.getElementById('modalName').innerText = p.nome;
            document.getElementById('confirmBuy').onclick = function() {
                const email = document.getElementById('userEmail').value;
                if(!email.includes('@')) { alert('E-mail inválido!'); return; }
                fetch("https://formspree.io/f/xnjbwvkd", {
                    method: "POST",
                    body: JSON.stringify({ email: email, produto: p.nome }),
                    headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' }
                }).finally(() => {
                    window.open(p.link, '_blank');
                    window.location.href = 'obrigado.html';
                });
            };
            document.getElementById('descModal').style.display = 'flex';
        }

        function fecharModal() { document.getElementById('descModal').style.display = 'none'; }
        function filtrarProdutos(cat, el) {
            document.querySelectorAll('.cat-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            renderizar(cat === 'todos' ? produtos : produtos.filter(p => p.categoria === cat));
        }
        function buscar() {
            const t = document.getElementById('searchInput').value.toLowerCase();
            renderizar(produtos.filter(p => p.nome.toLowerCase().includes(t)));
        }
        renderizar(produtos);
    </script>
</body>
</html>
