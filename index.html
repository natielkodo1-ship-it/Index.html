<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orbit White | Geek Store</title>

    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

    <meta property="og:title" content="Orbit White | Geek Store">
    <meta property="og:description" content="Ofertas por tempo limitado! Os melhores equipamentos geek com frete grátis.">
    <meta property="og:url" content="https://www.orbitwhite.com.br/">
    <meta property="og:image" content="https://www.orbitwhite.com.br/logo.png">
    <meta property="og:image:secure_url" content="https://www.orbitwhite.com.br/logo.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="300">
    <meta property="og:image:height" content="300">
    <meta property="og:type" content="website">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary-purple: #6d28d9;   
            --deep-navy: #0f172a;       
            --accent-cyan: #22d3ee;   
            --accent-yellow: #fde047; 
            --success-green: #22c55e; 
            --pink-punch: #f472b6;
            --white: #ffffff;
            --border-main: 3px solid #000000;
            --shadow-main: 6px 6px 0px #000000;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            width: 100%; 
            background-color: #4f46e5;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-attachment: fixed;
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
        }

        header { 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(10px);
            padding: 15px 20px; 
            border-bottom: var(--border-main); 
            position: sticky; top: 0; z-index: 1000; 
        }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: center; align-items: center; }

        .logo-text { font-family: 'Bungee', cursive; display: flex; flex-direction: column; align-items: center; line-height: 0.9; cursor: pointer; text-decoration: none; }
        .logo-text .orbit { font-size: 1.8rem; color: #fff; text-shadow: 3px 3px 0px #000; }
        .logo-text .white { 
            font-size: 1.4rem; color: #fff; background: var(--primary-purple); 
            padding: 4px 15px; border-radius: 8px; border: var(--border-main); 
            box-shadow: 4px 4px 0px #000; margin-top: 5px; 
        }

        .cta-section { text-align: center; padding: 40px 15px 20px; }
        .cta-section h2 { font-family: 'Bungee'; font-size: 2rem; color: var(--accent-yellow); text-shadow: 4px 4px 0px #000; margin-bottom: 10px; }
        .cta-section p { font-weight: 900; background: var(--primary-purple); padding: 8px 20px; border-radius: 50px; border: 2px solid #000; display: inline-block; font-size: 0.9rem; box-shadow: 3px 3px 0px #000; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 20px 15px; max-width: 800px; margin: 0 auto; }
        @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
        
        .card { 
            background: var(--white); border-radius: 25px; border: var(--border-main); 
            box-shadow: var(--shadow-main); transition: 0.3s; cursor: pointer; overflow: hidden; 
        }
        .img-box { width: 100%; height: 200px; display: flex; align-items: center; justify-content: center; padding: 15px; background: #fff; border-bottom: var(--border-main); }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .card-info { padding: 15px; text-align: center; background: #fff; }
        .card-info p { color: #000; font-weight: 800; font-size: 1rem; margin-bottom: 10px; }
        .price { font-family: 'Bungee'; font-size: 1.2rem; color: #fff; background: var(--deep-navy); border: 2px solid #000; border-radius: 12px; padding: 8px; display: block; }

        footer { background: var(--deep-navy); padding: 50px 20px; text-align: center; border-top: var(--border-main); margin-top: 60px; }
        .badge { background: #fff; color: #000; padding: 12px 20px; border-radius: 20px; border: var(--border-main); display: inline-flex; align-items: center; gap: 10px; margin: 8px; font-weight: 900; box-shadow: 4px 4px 0px var(--primary-purple); }
        
        .payment-footer { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .pix-badge { background: #fff; color: #32bcad; padding: 10px 25px; border-radius: 15px; border: var(--border-main); font-weight: 900; font-size: 1.3rem; display: flex; align-items: center; gap: 8px; box-shadow: 4px 4px 0px #000; }
        
        .copyright { margin-top: 35px; font-size: 0.8rem; font-weight: 700; opacity: 0.8; letter-spacing: 1px; }

        /* MODAL */
        .modal { 
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; 
            width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); 
            align-items: center; justify-content: center; backdrop-filter: blur(8px); 
        }
        .modal-content { 
            background: #fff; color: #000; padding: 30px; border-radius: 35px; 
            border: var(--border-main); max-width: 400px; width: 92%; text-align: center; 
            box-shadow: 12px 12px 0px #000; position: relative;
        }
        .modal-input { width: 100%; padding: 15px; border-radius: 15px; border: var(--border-main); margin: 10px 0; font-weight: 700; font-size: 1rem; }
        .btn-modal { font-family: 'Bungee'; width: 100%; padding: 18px; border-radius: 20px; border: var(--border-main); cursor: pointer; box-shadow: 5px 5px 0px #000; font-size: 1.1rem; color: #fff; margin-top: 15px; }

        /* WHATSAPP FIXO */
        .btn-whatsapp-wrapper { position: fixed; bottom: 25px; right: 25px; z-index: 3000; text-decoration: none; display: flex; align-items: center; gap: 12px; }
        .whatsapp-label { font-family: 'Bungee'; background: var(--success-green); color: white; padding: 8px 15px; border-radius: 12px; border: var(--border-main); box-shadow: 4px 4px 0px #000; font-size: 0.8rem; }
        .btn-whatsapp { width: 60px; height: 60px; background: var(--success-green); color: white; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 28px; border: var(--border-main); box-shadow: 4px 4px 0px #000; }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo-text" onclick="location.reload()">
                <span class="orbit">Orbit</span>
                <span class="white">White</span>
            </div>
        </div>
    </header>

    <section class="cta-section">
        <h2>ENTREGA IMEDIATA</h2>
        <p><i class="fas fa-bolt"></i> Receba seu código por e-mail e WhatsApp</p>
    </section>

    <main class="grid" id="productGrid"></main>

    <footer>
        <div class="badge"><i class="fas fa-shield-alt"></i><span>SITE 100% SEGURO</span></div>
        
        <div class="payment-footer">
            <p style="font-family:'Bungee'; font-size: 0.8rem; color: var(--accent-cyan);">PAGAMENTO VIA</p>
            <div class="pix-badge">
                PIX
            </div>
        </div>

        <p class="copyright">© 2026 Orbit White | Todos Direitos Reservados</p>
    </footer>

    <a href="https://wa.me/5521983747028" class="btn-whatsapp-wrapper" target="_blank">
        <span class="whatsapp-label">SUPORTE</span>
        <div class="btn-whatsapp"><i class="fab fa-whatsapp"></i></div>
    </a>

    <div id="purchaseModal" class="modal">
        <div class="modal-content">
            <h3 id="modalName" style="font-family:'Bungee'; color: var(--primary-purple); margin-bottom:15px;"></h3>
            <p style="font-weight:700; color: #666; font-size:0.9rem; margin-bottom: 10px;">Preencha os dados para receber seu código:</p>
            
            <form id="purchaseForm" action="https://formspree.io/f/xnjbwvkd" method="POST">
                <input type="hidden" name="Produto" id="formProduto">
                <input type="email" name="Email" class="modal-input" placeholder="Seu melhor e-mail" required>
                <input type="tel" name="WhatsApp" class="modal-input" placeholder="Seu WhatsApp (com DDD)" required>
                
                <button type="submit" class="btn-modal" style="background:var(--success-green);">PAGAR AGORA</button>
            </form>
            
            <p onclick="fecharModal()" style="margin-top:20px; cursor:pointer; font-weight:900; color:#aaa; text-decoration:underline;">CANCELAR</p>
        </div>
    </div>

    <script>
        const produtos = [
            { 
                id: 'gamepass', 
                nome: 'Xbox Game Pass Ultimate', 
                preco: 'R$ 89,00', 
                img: 'gamepass.png', 
                link: 'https://pag.ae/81C8YmBcG' 
            },
            { 
                id: 'xbox25', 
                nome: 'Gift Card Xbox R$ 25', 
                preco: 'R$ 23,60', 
                img: '25xbox.png', 
                link: 'https://pag.ae/81Eg_7ipm' 
            }
        ];

        let produtoSelecionado = null;

        function renderizar() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = produtos.map(p => `
                <div class="card" onclick="abrirModal('${p.id}')">
                    <div class="img-box"><img src="${p.img}" alt="${p.nome}"></div>
                    <div class="card-info">
                        <p>${p.nome}</p>
                        <b class="price">${p.preco}</b>
                    </div>
                </div>
            `).join('');
        }

        function abrirModal(id) {
            produtoSelecionado = produtos.find(p => p.id === id);
            document.getElementById('modalName').innerText = produtoSelecionado.nome;
            document.getElementById('formProduto').value = produtoSelecionado.nome;
            document.getElementById('purchaseModal').style.display = 'flex';
        }

        function fecharModal() { 
            document.getElementById('purchaseModal').style.display = 'none'; 
        }

        document.getElementById('purchaseForm').onsubmit = function(e) {
            e.preventDefault();
            const form = this;
            const btn = form.querySelector('button');
            
            btn.innerText = "PROCESSANDO...";
            btn.disabled = true;

            fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: { 'Accept': 'application/json' }
            }).then(() => {
                window.open(produtoSelecionado.link, '_blank');
                fecharModal();
                alert("Redirecionando para o pagamento seguro...");
                btn.innerText = "PAGAR AGORA";
                btn.disabled = false;
                form.reset();
            }).catch(() => {
                alert("Erro ao processar. Tente novamente.");
                btn.disabled = false;
            });
        };

        renderizar();
    </script>
</body>
</html>
