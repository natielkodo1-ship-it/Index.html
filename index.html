<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Orbit White | Hardware & Tech Premium</title>
    <meta name="description" content="Fones Bluetooth, Controles de PS4, Suportes de Carregamento e Eletrônicos Premium. O melhor em tecnologia para seu setup na Orbit White.">
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --roxo: #bc13fe; --dark: #0a0414; --sucesso: #00a650; --bg: #f4f4f4; --borda: #dddddd; --online: #ff0000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #333; overflow-x: hidden; }

        /* HEADER */
        header { background: var(--dark); padding: 8px 12px; border-bottom: 2px solid var(--roxo); position: sticky; top: 0; z-index: 1000; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 15px; }
        .logo-box { display: flex; flex-direction: column; line-height: 0.9; text-decoration: none; cursor: pointer; }
        .logo-main { color: white; font-weight: 800; font-size: 1.2rem; }
        .logo-sub { color: var(--roxo); font-weight: 800; font-size: 1.1rem; }
        
        .search-box { flex-grow: 1; position: relative; max-width: 500px; display: flex; align-items: center; }
        .search-box input { width: 100%; padding: 10px 12px 10px 38px; border-radius: 20px; border: none; background: rgba(255,255,255,0.12); color: white; font-size: 0.85rem; outline: none; }
        .search-box i { position: absolute; left: 14px; color: rgba(255,255,255,0.5); font-size: 0.9rem; }

        /* SLIDER */
        .slider-section { padding: 10px; max-width: 1200px; margin: 0 auto; position: relative; }
        .slider-container { position: relative; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .slider-wrapper { display: flex; overflow-x: auto; snap-type: x mandatory; scroll-behavior: smooth; }
        .slider-wrapper::-webkit-scrollbar { display: none; }
        .slider-item { min-width: 100%; width: 100%; snap-align: start; flex-shrink: 0; }
        .slider-item img { width: 100%; height: auto; display: block; }
        
        .btn-prev, .btn-next { 
            position: absolute; top: 50%; transform: translateY(-50%); background: none; border: none;
            cursor: pointer; z-index: 10; color: white; font-size: 2rem; text-shadow: 0 1px 4px rgba(0,0,0,0.6);
            transition: 0.3s; opacity: 0.5; padding: 10px;
        }
        .btn-prev:hover, .btn-next:hover { opacity: 1; }
        .btn-prev { left: 5px; } .btn-next { right: 5px; }

        .dots-container { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; cursor: pointer; transition: 0.3s; }
        .dot.active { background: var(--roxo); width: 20px; border-radius: 4px; }

        /* CATEGORIAS */
        .categories-scroll { display: flex; gap: 15px; overflow-x: auto; padding: 20px 10px; max-width: 1200px; margin: 0 auto; scrollbar-width: none; }
        .categories-scroll::-webkit-scrollbar { display: none; }
        .cat-item { display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 80px; cursor: pointer; transition: 0.3s; }
        .cat-icon { width: 55px; height: 55px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: var(--roxo); box-shadow: 0 3px 10px rgba(0,0,0,0.05); border: 1px solid var(--borda); transition: 0.3s; }
        .cat-item:hover .cat-icon, .cat-item.active .cat-icon { background: var(--roxo); color: white; transform: translateY(-3px); }
        .cat-item span { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: #666; }
        .cat-item.active span { color: var(--roxo); }

        /* CTA EM UMA LINHA */
        .cta-text-section { text-align: center; padding: 20px 15px; max-width: 1200px; margin: 0 auto; }
        .cta-text-section h2 { 
            font-size: clamp(1.1rem, 4vw, 1.6rem);
            font-weight: 900; color: var(--dark); 
            text-transform: uppercase; letter-spacing: -1px; line-height: 1.2;
            white-space: nowrap;
        }
        .cta-text-section p { font-size: 0.8rem; color: #777; margin-top: 4px; font-weight: 400; }

        /* GRID E CARDS */
        .main-content { max-width: 1200px; margin: 0 auto; padding: 10px; min-height: 400px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 900px) { .grid { grid-template-columns: repeat(4, 1fr); gap: 20px; } }
        
        .card { background: white; border-radius: 15px; padding: 15px; border: 1px solid var(--borda); text-align: center; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .card.hidden { display: none; }
        .card:hover { border-color: var(--roxo); transform: translateY(-3px); }
        .img-box { width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .name { font-size: 0.75rem; font-weight: 600; height: 36px; overflow: hidden; color: #333; margin-bottom: 5px; }
        .price { font-size: 1.1rem; font-weight: 800; color: #222; margin-bottom: 10px; }
        .btn-buy-card { background: var(--sucesso); color: white; padding: 12px; border-radius: 25px; border: none; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; width: 100%; cursor: pointer; }

        /* FOOTER */
        footer { background: var(--dark); color: #fff; padding: 40px 20px; text-align: center; border-top: 3px solid var(--roxo); margin-top: 40px; }
        .contact-footer { font-size: 0.75rem; color: #aaa; margin-bottom: 20px; }
        .footer-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 18px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; font-size: 0.75rem; }

        /* WHATSAPP */
        .wpp-container { position: fixed; bottom: 20px; right: 20px; z-index: 1500; }
        .wpp-btn { background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 30px; text-decoration: none; box-shadow: 0 5px 15px rgba(0,0,0,0.3); position: relative; }
        .status-on { position: absolute; top: 2px; right: 2px; width: 14px; height: 14px; background: var(--online); border: 2px solid white; border-radius: 50%; animation: pulse-red 2s infinite; }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(255, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo-box" onclick="filtrarProdutos('todos')">
                <span class="logo-main">ORBIT</span>
                <span class="logo-sub">WHITE</span>
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Buscar fones, controles..." onkeyup="buscar()">
            </div>
        </div>
    </header>

    <section class="slider-section">
        <div class="slider-container">
            <button class="btn-prev" onclick="moveSlider(-1)"><i class="fas fa-chevron-left"></i></button>
            <div class="slider-wrapper" id="slider">
                <div class="slider-item"><img src="banner.png"></div>
                <div class="slider-item"><img src="banner1.png"></div>
                <div class="slider-item"><img src="banner2.png"></div>
                <div class="slider-item"><img src="banner3.png"></div>
            </div>
            <button class="btn-next" onclick="moveSlider(1)"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="dots-container" id="dots">
            <div class="dot active" onclick="goSlide(0)"></div>
            <div class="dot" onclick="goSlide(1)"></div>
            <div class="dot" onclick="goSlide(2)"></div>
            <div class="dot" onclick="goSlide(3)"></div>
        </div>
    </section>

    <div class="categories-scroll">
        <div class="cat-item" onclick="filtrarProdutos('todos')">
            <div class="cat-icon"><i class="fas fa-border-all"></i></div>
            <span>Todos</span>
        </div>
        <div class="cat-item" onclick="filtrarProdutos('audio')">
            <div class="cat-icon"><i class="fas fa-headphones"></i></div>
            <span>Áudio</span>
        </div>
        <div class="cat-item" onclick="filtrarProdutos('controles')">
            <div class="cat-icon"><i class="fas fa-gamepad"></i></div>
            <span>Controles</span>
        </div>
        <div class="cat-item" onclick="filtrarProdutos('energia')">
            <div class="cat-icon"><i class="fas fa-bolt"></i></div>
            <span>Energia</span>
        </div>
        <div class="cat-item" onclick="filtrarProdutos('setup')">
            <div class="cat-icon"><i class="fas fa-keyboard"></i></div>
            <span>Setup</span>
        </div>
    </div>

    <div class="cta-text-section">
        <h2 id="ctaTitle">E AÍ, VAI COMPRAR O QUE HOJE?</h2>
        <p>Periféricos novos você acha aqui na orbit store.</p>
    </div>

    <main class="main-content">
        <div class="grid" id="productGrid"></div>
    </main>

    <footer>
        <div class="contact-footer">
            <p>neneltrofeu@gmail.com | (21) 9 8374-7028</p>
            <p>Rio de Janeiro, Belford Roxo, Brasil</p>
        </div>
        <div class="footer-badge">
            <i class="fas fa-user-shield"></i> <b>COMPRA SEGURA</b>
        </div>
        <p style="font-size: 0.65rem; color: #666; margin-top: 10px;">
            &copy; Orbit White | CNPJ: 60.726.256/0001-02
        </p>
    </footer>

    <div class="wpp-container">
        <a href="https://wa.me/5521983747028" class="wpp-btn" target="_blank">
            <div class="status-on"></div>
            <i class="fab fa-whatsapp"></i>
        </a>
    </div>

    <script>
        // ADICIONEI O CAMPO 'categoria' EM CADA PRODUTO
        const produtos = [
            { id: 'fone', categoria: 'audio', nome: 'Fone Bluetooth GD28 OWS - Premium', preco: 'R$ 21,00', img: 'fonebluetooth.png', link: 'https://pag.ae/81BP3rmb2' },
            { id: 'suporte', categoria: 'energia', nome: 'Base Carregador para Controle PS5', preco: 'R$ 60,00', img: 'basecarregadorps5.png', link: 'https://pag.ae/81BP5Hupo' },
            { id: 'controle', categoria: 'controles', nome: 'Controle Sem Fio Dualshock 4', preco: 'R$ 70,00', img: 'controleps4.png', link: 'https://pag.ae/81BP4FXb2' },
            { id: 'gamesir', categoria: 'controles', nome: 'Controle Gamesir G7 SE - Hall Effect', preco: 'R$ 300,00', img: 'controlegamesirg7.png', link: 'https://pag.ae/81BP42Mjo' }
        ];

        const grid = document.getElementById('productGrid');

        // Renderização Inicial
        function renderizar(lista) {
            grid.innerHTML = "";
            lista.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div class="img-box"><img src="${p.img}"></div><h3 class="name">${p.nome}</h3><span class="price">${p.preco}</span><button class="btn-buy-card" onclick="window.location.href='${p.link}'">COMPRAR</button>`;
                grid.appendChild(card);
            });
        }

        renderizar(produtos);

        // FUNÇÃO DE FILTRO POR CATEGORIA
        function filtrarProdutos(cat) {
            // Remove destaque de todas as categorias e coloca na clicada
            document.querySelectorAll('.cat-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');

            if(cat === 'todos') {
                renderizar(produtos);
                document.getElementById('ctaTitle').innerText = "E AÍ, VAI COMPRAR O QUE HOJE?";
            } else {
                const filtrados = produtos.filter(p => p.categoria === cat);
                renderizar(filtrados);
                document.getElementById('ctaTitle').innerText = "CATEGORIA: " + cat.toUpperCase();
            }
            
            // Scroll suave para a seção de produtos ao filtrar
            window.scrollTo({ top: document.querySelector('.cta-text-section').offsetTop - 100, behavior: 'smooth' });
        }

        // Busca simples
        function buscar() {
            const termo = document.getElementById('searchInput').value.toLowerCase();
            const resultado = produtos.filter(p => p.nome.toLowerCase().includes(termo));
            renderizar(resultado);
        }

        // Lógica do Slider
        const slider = document.getElementById('slider');
        const dots = document.querySelectorAll('.dot');
        let currentSlide = 0;

        function updateDots() {
            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentSlide));
        }

        function moveSlider(dir) {
            const total = 4;
            currentSlide = (currentSlide + dir + total) % total;
            slider.scrollTo({ left: currentSlide * slider.offsetWidth, behavior: 'smooth' });
            updateDots();
        }

        function goSlide(index) {
            currentSlide = index;
            slider.scrollTo({ left: currentSlide * slider.offsetWidth, behavior: 'smooth' });
            updateDots();
        }

        slider.addEventListener('scroll', () => {
            const index = Math.round(slider.scrollLeft / slider.offsetWidth);
            if(index !== currentSlide) {
                currentSlide = index;
                updateDots();
            }
        });
    </script>
</body>
</html>
