<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pedido Confirmado | Orbit White</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-page: #6d28d9;       /* Roxo Neon */
            --header-dark: #1e1b4b;   /* Azul Marinho */
            --accent-cyan: #22d3ee;   /* Ciano */
            --accent-yellow: #fde047; /* Amarelo */
            --accent-pink: #f472b6;   /* Rosa */
            --sucesso-green: #4ade80; /* Verde Lima */
            --whatsapp-verde: #25d366; 
            
            --border-cartoon: 3px solid #000000;
            --shadow-cartoon: 8px 8px 0px #000000;
            --font-main: 'Inter', sans-serif;
            --font-cartoon: 'Bungee', cursive;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg-page); 
            color: #fff; 
            font-family: var(--font-main); 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container-sucesso {
            background: var(--accent-cyan);
            max-width: 500px;
            width: 100%;
            border: var(--border-cartoon);
            box-shadow: var(--shadow-cartoon);
            border-radius: 30px;
            padding: 40px 25px;
            text-align: center;
            position: relative;
        }

        /* Ícone Gigante */
        .icon-box {
            background: var(--accent-yellow);
            width: 100px;
            height: 100px;
            margin: 0 auto 25px;
            border-radius: 25px;
            border: var(--border-cartoon);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #000;
            transform: rotate(-5deg);
            box-shadow: 4px 4px 0px #000;
        }

        h1 {
            font-family: var(--font-cartoon);
            color: #000;
            font-size: 2.2rem;
            text-shadow: 3px 3px 0px #fff;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .status-tag {
            background: #000;
            color: var(--sucesso-green);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 10px;
            font-family: var(--font-cartoon);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .mensagem {
            background: #fff;
            color: #000;
            padding: 20px;
            border-radius: 20px;
            border: var(--border-cartoon);
            font-weight: 800;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 30px;
            text-align: left;
        }

        .mensagem b {
            color: var(--bg-page);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            font-family: var(--font-cartoon);
            text-decoration: none;
            padding: 18px;
            border-radius: 20px;
            border: var(--border-cartoon);
            font-size: 1.1rem;
            transition: 0.2s;
            display: block;
            box-shadow: 4px 4px 0px #000;
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }

        .btn-whats {
            background: var(--whatsapp-verde);
            color: #fff;
        }

        .btn-loja {
            background: var(--accent-pink);
            color: #000;
        }

        .footer-text {
            margin-top: 25px;
            font-family: var(--font-cartoon);
            font-size: 0.7rem;
            color: #000;
            opacity: 0.6;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .mensagem { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="container-sucesso">
        <div class="icon-box">
            <i class="fas fa-check-circle"></i>
        </div>

        <div class="status-tag">PEDIDO #CONFIRMADO</div>

        <h1>TUDO PRONTO!<br>PEDIDO RECEBIDO.</h1>

        <div class="mensagem">
            Obrigado por comprar na <b>Orbit White</b>. <br><br>
            O seu pedido está sendo processado. Informações de rastreamento e outros detalhes serão enviados via e-mail!
        </div>

        <div class="btn-group">
            <a href="https://wa.me/5521983747028?text=Olá! Acabei de fazer um pedido na Orbit White e gostaria de confirmar os detalhes." class="btn btn-whats">
                <i class="fab fa-whatsapp"></i> FALAR NO WHATSAPP
            </a>
            
            <a href="index.html" class="btn btn-loja">VOLTAR PARA A LOJA</a>
        </div>

        <p class="footer-text">ORBIT WHITE | A SUA LOJA GEEK DA ATUALIDADE</p>
    </div>

</body>
</html>
