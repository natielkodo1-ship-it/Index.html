<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Confirmado | Orbit White</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --roxo: #bc13fe;
            --roxo-claro: #d158ff;
            --dark: #0a0414;
            --dark-light: #160b24;
            --sucesso: #25d366;
            --branco: #ffffff;
            --cinza: #a1a1a1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--dark); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            text-align: center;
            padding: 20px;
            color: var(--branco);
            overflow: hidden; /* Impede scroll durante animação */
        }

        /* Fundo com efeito de luz sutil */
        body::before {
            content: '';
            position: absolute;
            width: 300px; height: 300px;
            background: var(--roxo);
            filter: blur(150px);
            opacity: 0.2;
            border-radius: 50%;
            top: 10%; left: 10%;
            z-index: -1;
        }

        .thank-you-card {
            background: var(--dark-light);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            max-width: 480px;
            width: 100%;
            border: 1px solid rgba(188, 19, 254, 0.2);
            position: relative;
            overflow: hidden;
            animation: cardEnter 0.6s ease-out;
        }

        /* Linha brilhante no topo */
        .thank-you-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, var(--roxo), transparent);
        }

        /* Ícone de Sucesso Animado */
        .success-icon-container {
            position: relative;
            display: inline-block;
            margin-bottom: 30px;
            animation: iconPop 0.8s ease-out 0.2s both;
        }

        .icon-shield {
            font-size: 80px;
            color: var(--roxo);
            position: relative;
            z-index: 2;
        }

        .icon-check {
            font-size: 35px;
            color: var(--branco);
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -45%);
            z-index: 3;
        }

        /* Brilho pulsante atrás do ícone */
        .icon-glow {
            position: absolute;
            width: 100px; height: 100px;
            background: var(--roxo);
            filter: blur(40px);
            opacity: 0.5;
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            animation: glowPulse 2s infinite;
        }

        /* Títulos */
        .status-badge {
            display: inline-block;
            background: rgba(37, 211, 102, 0.1);
            color: var(--sucesso);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            border: 1px solid rgba(37, 211, 102, 0.3);
            animation: fadeIn 0.5s ease-out 0.4s both;
        }

        h1 { 
            font-weight: 800; 
            color: var(--branco); 
            margin-bottom: 20px; 
            font-size: 2rem; 
            line-height: 1.2;
            animation: fadeIn 0.5s ease-out 0.5s both;
        }
        
        h1 span { color: var(--roxo); }

        /* O Texto que você pediu */
        .main-text { 
            color: var(--cinza); 
            line-height: 1.6; 
            margin-bottom: 35px; 
            font-size: 1rem; 
            font-weight: 400;
            animation: fadeIn 0.5s ease-out 0.6s both;
        }
        
        .main-text b { color: var(--branco); font-weight: 700; }

        /* Grupo de Botões */
        .btn-group { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            animation: fadeIn 0.5s ease-out 0.7s both;
        }

        /* Botão WhatsApp */
        .btn-wpp {
            background: var(--sucesso);
            color: var(--branco);
            padding: 16px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            border: none;
            cursor: pointer;
        }

        .btn-wpp:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5);
            background: #20ba5a;
        }

        /* Botão Voltar */
        .btn-back {
            background: transparent;
            color: var(--roxo-claro);
            padding: 16px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            border: 2px solid rgba(188, 19, 254, 0.3);
            display: inline-block;
            width: 100%;
        }

        .btn-back:hover {
            background: rgba(188, 19, 254, 0.1);
            border-color: var(--roxo);
            color: var(--branco);
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.3);
        }

        /* Nota de rodapé */
        .footer-note {
            margin-top: 35px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            animation: fadeIn 0.5s ease-out 0.8s both;
        }

        /* --- ANIMAÇÕES --- */
        @keyframes cardEnter {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes iconPop {
            0% { opacity: 0; transform: scale(0.5); }
            70% { transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* Responsividade para Celulares Pequenos */
        @media (max-width: 400px) {
            .thank-you-card { padding: 30px 20px; }
            h1 { font-size: 1.6rem; }
            .main-text { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="thank-you-card">
        <div class="success-icon-container">
            <div class="icon-glow"></div>
            <i class="fas fa-shield-alt icon-shield"></i>
            <i class="fas fa-check icon-check"></i>
        </div>

        <div class="status-badge">Pedido #Confirmado</div>

        <h1>Tudo pronto! <br><span>Pedido Recebido.</span></h1>
        
        <p class="main-text">
            Obrigado por comprar na <b>Orbit White</b>. O seu pedido está sendo processado, informações do código de rastreamento e outros detalhes serão enviados via e-mail.
        </p>
        
        <div class="btn-group">
            <a href="https://wa.me/5521983747028?text=Olá! Acabei de fazer um pedido na Orbit White e gostaria de confirmar os detalhes." class="btn-wpp" target="_blank">
                <i class="fab fa-whatsapp"></i> FALAR NO WHATSAPP
            </a>
            
            <a href="index.html" class="btn-back">VOLTAR PARA A LOJA</a>
        </div>

        <p class="footer-note">Orbit White | Tecnologia ao seu alcance.</p>
    </div>

</body>
</html>
